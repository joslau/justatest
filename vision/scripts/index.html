<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe Object Detector</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #333; margin-bottom: 24px; }
        
        .video-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #ddd;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #cameraVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        .placeholder {
            color: #666;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover { background: #0056b3; }
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed;
        }
        
        .result-box {
            margin-top: 20px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #007bff;
            display: none;
        }
        
        .result-box.error {
            border-left-color: #dc3545;
            background: #ffeaea;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 MediaPipe 物件偵測器</h1>
        
        <div class="video-container">
            <video id="cameraVideo" playsinline autoplay muted></video>
            <div class="placeholder" id="placeholder">
                👆 點擊「開始偵測」按鈕<br>
                以啟動相機並進行物件辨識
            </div>
        </div>
        
        <button id="detectBtn">📷 開始偵測</button>
        
        <div class="result-box" id="resultBox"></div>
    </div>

    <script type="module">
        let objectDetector = null;
        let currentStream = null;
        const videoElement = document.getElementById('cameraVideo');
        const placeholder = document.getElementById('placeholder');
        const detectBtn = document.getElementById('detectBtn');
        const resultBox = document.getElementById('resultBox');

        // 初始化模型
        async function initModel() {
            try {
                console.log('正在載入 MediaPipe 模型...');
                const { ObjectDetector, FilesetResolver } = await import(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"
                );
                
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                
                objectDetector = await ObjectDetector.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 
                            "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/int8/1/efficientdet_lite0.tflite",
                        delegate: "GPU"
                    },
                    scoreThreshold: 0.5,
                    runningMode: "IMAGE"
                });
                
                console.log('模型載入完成！');
                return true;
            } catch (error) {
                console.error('模型載入失敗:', error);
                throw error;
            }
        }

        // 停止相機並清理資源
        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            videoElement.srcObject = null;
            videoElement.style.display = 'none';
            placeholder.style.display = 'block';
        }

        // 執行偵測
        async function performDetection() {
            detectBtn.disabled = true;
            detectBtn.innerHTML = '<span class="loading-spinner"></span>辨識中...';
            
            try {
                // 1. 確保模型已載入
                if (!objectDetector) {
                    await initModel();
                }

                // 2. 請求相機權限（需要使用者互動）
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                
                currentStream = stream;
                videoElement.srcObject = stream;
                videoElement.style.display = 'block';
                placeholder.style.display = 'none';
                
                // 等待視頻開始播放
                await new Promise(resolve => {
                    if (videoElement.readyState >= 1) resolve();
                    else videoElement.onplay = resolve;
                });

                // 3. 執行物件偵測
                const detections = objectDetector.detect(videoElement);
                
                // 4. 整理結果
                let resultText = '';
                if (detections.detections && detections.detections.length > 0) {
                    const labels = detections.detections.map(d => 
                        `${d.categories[0].categoryName} (${Math.round(d.categories[0].score * 100)}%)`
                    ).join(', ');
                    resultText = `✅ 偵測到：${labels}`;
                } else {
                    resultText = '❌ 未偵測到明顯物件';
                }

                // 5. 顯示結果
                resultBox.style.display = 'block';
                resultBox.classList.remove('error');
                resultBox.innerHTML = `<strong>辨識結果：</strong><br>${resultText}`;

            } catch (error) {
                console.error('偵測錯誤:', error);
                resultBox.style.display = 'block';
                resultBox.classList.add('error');
                resultBox.innerHTML = `❌ 辨識失敗：<br>${error.message || String(error)}`;
                
                // 特別處理相機權限被拒的情況
                if (error.name === 'NotAllowedError') {
                    resultBox.innerHTML += '<br><small>請檢查瀏覽器是否已允許相機權限</small>';
                }
            }

            // 6. 清理並恢復按鈕狀態
            stopCamera();
            detectBtn.disabled = false;
            detectBtn.innerHTML = '📷 開始偵測';
        }

        // 事件綁定
        detectBtn.addEventListener('click', performDetection);

        // 頁面載入時預先初始化模型（可選）
        initModel().catch(err => console.error('預載模型失敗:', err));
    </script>
</body>
</html>
