<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>物件偵測器</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 20px;
            background: #1a1a2e; color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        #cameraVideo {
            width: 100%;
            border-radius: 12px;
            background: #000;
            display: none;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 16px;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn:disabled { background: #666; opacity: 0.5; }
        
        .result-box {
            margin-top: 20px;
            padding: 16px;
            background: #16213e;
            border-radius: 8px;
            display: none;
        }
        
        .loading {
            text-align: center;
            color: #4ecca3;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">🔍 MediaPipe 物件偵測器</h2>
        
        <video id="cameraVideo" playsinline autoplay muted></video>
        
        <button id="detectBtn" class="btn">📷 開始偵測</button>
        
        <div class="result-box" id="resultBox"></div>
    </div>

    <script type="module">
        let objectDetector = null;
        let currentStream = null;
        const videoElement = document.getElementById('cameraVideo');
        const detectBtn = document.getElementById('detectBtn');
        const resultBox = document.getElementById('resultBox');

        // 初始化模型
        async function initModel() {
            try {
                const { ObjectDetector, FilesetResolver } = await import(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"
                );
                
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                
                objectDetector = await ObjectDetector.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 
                            "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/int8/1/efficientdet_lite0.tflite",
                        delegate: "GPU"  // iOS will auto-fallback to CPU if needed
                    },
                    scoreThreshold: 0.5,
                    runningMode: "IMAGE"
                });
                
                console.log('✅ 模型載入完成');
                return true;
            } catch (error) {
                console.error('❌ 模型載入失敗:', error);
                throw error;
            }
        }

        // 停止相機
        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            videoElement.srcObject = null;
            videoElement.style.display = 'none';
        }

        // 執行偵測（由使用者點擊觸發）
        async function performDetection() {
            detectBtn.disabled = true;
            detectBtn.textContent = '⏳ 辨識中...';
            
            try {
                if (!objectDetector) await initModel();

                // iOS: Camera access triggered by USER TAP ✓
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                
                currentStream = stream;
                videoElement.srcObject = stream;
                videoElement.style.display = 'block';
                
                await new Promise(resolve => {
                    if (videoElement.readyState >= 1) resolve();
                    else videoElement.onplay = resolve;
                });

                const detections = objectDetector.detect(videoElement);
                
                // Filter and format results
                const filteredDetections = detections.detections.filter(d => 
                    d.categories.length > 0 && d.categories[0].score >= 0.5
                );

                if (filteredDetections.length > 0) {
                    const labels = filteredDetections.map(d => 
                        `${d.categories[0].categoryName} (${Math.round(d.categories[0].score * 100)}%)`
                    ).join(', ');
                    
                    resultBox.style.display = 'block';
                    resultBox.innerHTML = `<strong>✅ 偵測到：</strong><br>${labels}`;
                    
                    // Return result to app after showing UI
                    setTimeout(() => {
                        stopCamera();
                        returnResult(`我偵測到畫面有：${labels}`, filteredDetections);
                    }, 2000);
                } else {
                    resultBox.style.display = 'block';
                    resultBox.innerHTML = '<strong>❌</strong> 未偵測到明顯物件';
                    
                    setTimeout(() => {
                        stopCamera();
                        returnResult("畫面入面冇明顯嘅物件。", []);
                    }, 2000);
                }

            } catch (error) {
                console.error('偵測錯誤:', error);
                resultBox.style.display = 'block';
                
                let errorMsg = `❌ 辨識失敗：${error.message}`;
                if (error.name === 'NotAllowedError') {
                    errorMsg = "❌ 無法存取相機<br><small>請在設定中允許相機權限</small>";
                }
                
                resultBox.innerHTML = errorMsg;
                
                setTimeout(() => {
                    stopCamera();
                    returnResult(null, null, errorMsg);
                }, 2000);
            }

            detectBtn.disabled = false;
            detectBtn.textContent = '📷 開始偵測';
        }

        // Return result to AI Edge Gallery app
        function returnResult(resultText, detections, error) {
            const response = {};
            
            if (error) {
                response.error = error;
            } else {
                response.result = resultText;
                if (detections && detections.length > 0) {
                    response.detections = detections.map(d => ({
                        categoryName: d.categories[0].categoryName,
                        score: parseFloat(d.categories[0].score.toFixed(2)),
                        boundingBox: {
                            xMin: parseFloat(d.boundingBox.xMin.toFixed(3)),
                            yMin: parseFloat(d.boundingBox.yMin.toFixed(3)),
                            xMax: parseFloat(d.boundingBox.xMax.toFixed(3)),
                            yMax: parseFloat(d.boundingBox.yMax.toFixed(3))
                        }
                    }));
                }
            }
            
            window['ai_edge_gallery_get_result'](JSON.stringify(response));
        }

        // Entry point - Return webview HTML instead of executing directly
        window['ai_edge_gallery_get_result'] = async (data) => {
            const params = JSON.parse(data);
            const facingMode = params.facingMode || "environment";
            
            // Pre-load model in background
            initModel().catch(err => console.warn('預載失敗:', err));
            
            // Return webview for iOS compatibility
            return JSON.stringify({
                result: "請在下方介面點擊「開始偵測」按鈕",
                webview: {
                    url: "index.html?facingMode=" + facingMode,
                    aspectRatio: 1.333
                }
            });
        };

        detectBtn.addEventListener('click', performDetection);
        
        // Pre-initialize model
        initModel().catch(err => console.warn('預載模型失敗:', err));
    </script>
</body>
</html>
