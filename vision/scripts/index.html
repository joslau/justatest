<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MediaPipe Object Detector</title>
</head>
<body>
    <script type="module">
        let objectDetector = null;
        
        // 初始化模型的函數
        async function initModel() {
            try {
                const { ObjectDetector, FilesetResolver } = await import(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"
                );
                
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                
                objectDetector = await ObjectDetector.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 
                            "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/int8/1/efficientdet_lite0.tflite",
                        delegate: "GPU"
                    },
                    scoreThreshold: 0.5,
                    runningMode: "IMAGE"
                });
                
                console.log('✅ MediaPipe 模型載入成功');
                return true;
            } catch (error) {
                console.error('❌ 模型載入失敗:', error);
                throw error;
            }
        }

        // 停止相機並清理資源
        function stopCamera(stream) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        // 官方規定的全域進入點
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                // 解析參數
                const params = JSON.parse(data);
                const facingMode = params.facingMode || "environment";
                const minScore = params.minScore || 0.5;

                console.log(`📷 開始偵測：鏡頭=${facingMode}, 閾值=${minScore}`);

                // 1. 如果模型未載入，先載入模型
                if (!objectDetector) {
                    await initModel();
                }

                // 2. 啟動相機（支援前後鏡頭切換）
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode } 
                });
                
                // 3. 建立一個隱藏的 video 元素來播放相機畫面
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute("playsinline", true); // iOS Safari 必備
                video.style.display = 'none'; // 隱藏不顯示
                document.body.appendChild(video);
                
                await video.play();
                
                // 4. 等待一下讓對焦穩定（約 300ms）
                await new Promise(resolve => setTimeout(resolve, 300));

                // 5. 執行物件偵測
                const detections = objectDetector.detect(video);
                
                // 6. 關閉相機並清理 video element
                stopCamera(stream);
                document.body.removeChild(video);

                // 7. 過濾並整理結果（根據 minScore）
                const filteredDetections = detections.detections.filter(d => 
                    d.categories.length > 0 && d.categories[0].score >= minScore
                );

                // 8. 建立詳細的偵測資料結構
                const detectionDetails = filteredDetections.map(d => ({
                    categoryName: d.categories[0].categoryName,
                    score: parseFloat(d.categories[0].score.toFixed(2)),
                    boundingBox: {
                        xMin: parseFloat(d.boundingBox.xMin.toFixed(3)),
                        yMin: parseFloat(d.boundingBox.yMin.toFixed(3)),
                        xMax: parseFloat(d.boundingBox.xMax.toFixed(3)),
                        yMax: parseFloat(d.boundingBox.yMax.toFixed(3))
                    }
                }));

                // 9. 整理結果文字（Traditional Chinese）
                if (filteredDetections.length > 0) {
                    const labels = filteredDetections.map(d => 
                        `${d.categories[0].categoryName} (${Math.round(d.categories[0].score * 100)}%)`
                    ).join(', ');
                    
                    return JSON.stringify({
                        result: `我偵測到畫面有：${labels}`,
                        detections: detectionDetails,
                        count: filteredDetections.length
                    });
                } else {
                    return JSON.stringify({
                        result: "畫面入面冇明顯嘅物件。",
                        detections: [],
                        count: 0
                    });
                }

            } catch (error) {
                console.error('❌ 辨識失敗:', error);
                
                let errorMessage = `辨識失敗：${error.message || String(error)}`;
                
                // 特別處理相機權限被拒的情況
                if (error.name === 'NotAllowedError') {
                    errorMessage = "無法存取相機。請檢查瀏覽器是否已允許相機權限，或在設定中開啟相機許可。";
                } else if (error.name === 'NotFoundError') {
                    errorMessage = "找不到相機設備。請確認裝置有安裝相機並已開啟。";
                } else if (error.name === 'OverconstrainedError') {
                    errorMessage = "相機參數不支援。請嘗試使用預設設定。";
                }

                return JSON.stringify({
                    error: errorMessage
                });
            }
        };

        // 頁面載入時預先初始化模型（可選，提升首次使用體驗）
        console.log('🔄 正在預載 MediaPipe 模型...');
        initModel().catch(err => {
            console.warn('⚠️ 預載失敗，將在首次呼叫時再嘗試:', err);
        });
    </script>
</body>
</html>
