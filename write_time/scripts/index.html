<!DOCTYPE html>
<html>
<body>
<script>
    window['ai_edge_gallery_get_result'] = async (data) => {
        try {
            // 1. 獲取當前時間
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-HK'); // 獲取日期
            const timeStr = now.toLocaleTimeString('zh-HK'); // 獲取時間

            // 2. 將時間編碼成 URL 參數
            const params = new URLSearchParams({ date: dateStr, time: timeStr }).toString();

            // 3. 傳送帶有參數的 url 俾 App
            return JSON.stringify({
                result: "獲取時間成功！請查看下方介面。",
                webview: {
                    url: `ui.html?${params}`, // <--- 重點喺呢度，將時間黐落網址後面
                    aspectRatio: 1.0
                }
            });
        } catch (e) {
            return JSON.stringify({ error: e.message });
        }
    };
</script>
</body>
</html>
