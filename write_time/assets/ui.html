<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Logger</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            background-color: white;
        }
        h3 { color: #333; margin-top: 0; }
        .time-box {
            font-size: 18px;
            color: #555;
            font-weight: bold;
            margin: 15px 0;
        }
        button { 
            background: #2b70f3; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h3>⏱️ 獲取時間成功</h3>
    
    <div class="time-box">
        <div id="dateText">載入中...</div>
        <div id="timeText"></div>
    </div>
    
    <button id="saveBtn">💾 儲存 .md 日誌檔</button>

    <script>
        // 當網頁載入完成後執行
        window.onload = () => {
            try {
                // 1. 從網址讀取時間參數
                const params = new URLSearchParams(window.location.search);
                const dateStr = params.get('date') || '未能獲取日期';
                const timeStr = params.get('time') || '未能獲取時間';

                // 2. 將讀取到的時間替換到畫面上
                document.getElementById('dateText').innerText = dateStr;
                document.getElementById('timeText').innerText = timeStr;

                // 3. 處理「儲存按鈕」的點擊事件
                document.getElementById('saveBtn').onclick = () => {
                    // 準備要寫入 .md 檔案的內容
                    const mdContent = `# 時間日誌\n\n- **日期**: ${dateStr}\n- **時間**: ${timeStr}\n\n*由 AI Edge Gallery 自動生成*`;
                    
                    // 將內容轉換為 Blob (檔案物件)
                    const blob = new Blob([mdContent], { type: 'text/markdown' });
                    
                    // 建立一個隱藏的下載連結
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `TimeLog_${dateStr.replace(/\//g, '')}_${timeStr.replace(/:/g, '')}.md`; 
                    
                    // 模擬點擊下載
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    // 俾個視覺回饋用家
                    document.getElementById('saveBtn').innerText = '✅ 下載請求已發送！';
                    document.getElementById('saveBtn').style.background = '#28a745';
                };

            } catch (e) {
                document.getElementById('dateText').innerText = '載入發生錯誤';
            }
        };
    </script>
</body>
</html>
