<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Logger</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            background-color: white;
        }
        h3 { color: #333; margin-top: 0; }
        .time-box {
            font-size: 18px;
            color: #555;
            font-weight: bold;
            margin: 15px 0;
        }
        button { 
            background: #2b70f3; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h3>⏱️ 獲取時間成功</h3>
    
    <div class="time-box">
        <div id="dateText">載入中...</div>
        <div id="timeText"></div>
    </div>
    
    <button id="saveBtn">💾 儲存 .md 日誌檔</button>

    <script>
        // 當網頁載入完成後執行
        window.onload = () => {
            try {
                // 從網址讀取時間參數 (例如 ?date=xxx&time=xxx)
                const params = new URLSearchParams(window.location.search);
                const dateStr = params.get('date') || '未能獲取日期';
                const timeStr = params.get('time') || '未能獲取時間';

                // 將讀取到的時間替換到畫面上
                document.getElementById('dateText').innerText = dateStr;
                document.getElementById('timeText').innerText = timeStr;
            } catch (e) {
                document.getElementById('dateText').innerText = '載入發生錯誤';
            }
        };
    </script>
</body>
</html>
