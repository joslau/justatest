<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>儲存時間檔案</title>
  <style>
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
    .card { background: white; padding: 30px 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 20px;}
    h2 { margin: 0 0 10px 0; color: #333; }
    p { font-size: 20px; color: #666; margin-bottom: 30px; font-weight: bold; }
    button { 
      background: #007AFF; color: white; border: none; 
      padding: 14px 24px; font-size: 16px; font-weight: bold;
      border-radius: 10px; cursor: pointer; width: 100%;
    }
    button:active { background: #0056b3; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🕒 獲取時間成功</h2>
    <p id="displayTime">載入中...</p>
    <button id="saveBtn">💾 儲存 .md 日誌檔</button>
  </div>

  <script>
    // 從 URL 讀取 index.js 傳遞過來的日期與時間
    const params = new URLSearchParams(window.location.search);
    const dateStr = params.get('date') || 'unknown_date';
    const timeStr = params.get('time') || 'unknown_time';

    // 顯示在畫面上
    document.getElementById('displayTime').innerText = dateStr + " " + timeStr;

    // 點擊按鈕時生成並下載檔案
    document.getElementById('saveBtn').onclick = () => {
      const fileContent = timeStr + "\n"; // 檔案內容只寫入時間
      
      // 建立 Blob (將文字轉為檔案)，明確指定 utf-8
      const blob = new Blob([fileContent], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      
      // 觸發下載 (檔名為今日日期)
      const a = document.createElement('a');
      a.href = url;
      a.download = dateStr + ".md";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
  </script>
</body>
</html>
